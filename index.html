<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrustPositif Monitor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#050816;
    color:white;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    color:#00f7ff;
    text-shadow:
        0 0 10px #00f7ff,
        0 0 20px #00f7ff,
        0 0 40px #00f7ff;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#7dd3fc;
    margin-bottom:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:#0b1120;
    border:1px solid #00f7ff44;
    border-radius:15px;
    padding:20px;
    box-shadow:
        0 0 15px #00f7ff22,
        inset 0 0 10px #00f7ff11;
}

.card-title{
    color:#94a3b8;
    font-size:14px;
}

.card-value{
    font-size:34px;
    margin-top:8px;
    font-weight:bold;
}

#total{
    color:#00f7ff;
    text-shadow:0 0 10px #00f7ff;
}

#blocked{
    color:#ff3b6b;
    text-shadow:0 0 10px #ff3b6b;
}

#safe{
    color:#00ff88;
    text-shadow:0 0 10px #00ff88;
}

#lastupdate{
    margin-bottom:20px;
    padding:14px;
    border-radius:10px;
    background:#08111f;
    border:1px solid #00f7ff44;
    color:#7dd3fc;
    box-shadow:0 0 12px #00f7ff22;
}

.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:14px;
    background:#111827;
    color:white;
    border:none;
    outline:none;
    border-radius:10px;
    border:1px solid #00f7ff55;
    font-size:16px;
}

.search-box input:focus{
    box-shadow:0 0 15px #00f7ff88;
}

.table-box{
    background:#0b1120;
    border-radius:15px;
    overflow:hidden;
    border:1px solid #00f7ff33;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#08111f;
    color:#00f7ff;
    padding:15px;
    text-align:left;
}

td{
    padding:14px;
    border-bottom:1px solid #1e293b;
}

tr:hover{
    background:#111827;
}

.blocked{
    color:#ff4d6d;
    font-weight:bold;
    text-shadow:0 0 8px #ff4d6d;
}

.safe{
    color:#00ff88;
    font-weight:bold;
    text-shadow:0 0 8px #00ff88;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#64748b;
}

</style>

</head>

<body>

<div class="container">

<h1>⚡ TRUSTPOSITIF MONITOR ⚡</h1>

<div class="subtitle">
Realtime Monitoring Domain TrustPositif Indonesia
</div>

<div class="cards">

<div class="card">
<div class="card-title">
TOTAL DOMAIN
</div>
<div class="card-value" id="total">
0
</div>
</div>

<div class="card">
<div class="card-title">
BLOCKED
</div>
<div class="card-value" id="blocked">
0
</div>
</div>

<div class="card">
<div class="card-title">
SAFE
</div>
<div class="card-value" id="safe">
0
</div>
</div>

</div>

<div id="lastupdate">
🕒 Last Update : Loading...
</div>

<div class="search-box">

<input
type="text"
id="search"
placeholder="🔍 Cari domain..."
onkeyup="filterDomain()"
>

</div>

<div class="table-box">

<table>

<thead>

<tr>
<th>DOMAIN</th>
<th>STATUS</th>
</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

</div>

<div class="footer">
Powered by Telegram Bot • GitHub • Cloudflare Pages
</div>

</div>

<script>

let allData = [];

async function loadData(){

    try{

        const response =
        await fetch(
            "./status.json?t=" + Date.now()
        );

        const data =
        await response.json();

        allData = data.data;

        document.getElementById(
            "lastupdate"
        ).innerHTML =
        "🕒 Last Update : " +
        data.last_update;

        document.getElementById(
            "total"
        ).innerHTML =
        data.total;

        document.getElementById(
            "blocked"
        ).innerHTML =
        data.blocked;

        document.getElementById(
            "safe"
        ).innerHTML =
        data.safe;

        renderTable(allData);

    }
    catch(e){

        console.log(e);

        document.getElementById(
            "lastupdate"
        ).innerHTML =
        "❌ Gagal memuat status.json";

    }

}

function renderTable(list){

    let html = "";

    list.forEach(item=>{

        html += `
        <tr>

            <td>${item.domain}</td>

            <td class="${
                item.blocked
                ? "blocked"
                : "safe"
            }">

            ${
                item.blocked
                ? "🚫 BLOCKED"
                : "✅ SAFE"
            }

            </td>

        </tr>
        `;

    });

    document.getElementById(
        "tbody"
    ).innerHTML = html;

}

function filterDomain(){

    const keyword =
    document
    .getElementById("search")
    .value
    .toLowerCase();

    const filtered =
    allData.filter(item=>

        item.domain
        .toLowerCase()
        .includes(keyword)

    );

    renderTable(filtered);

}

loadData();

setInterval(
    loadData,
    30000
);

</script>

</body>

</html>
