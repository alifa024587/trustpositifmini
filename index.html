<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nawala Checker Minitoto</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,#003b46 0%,transparent 40%),
    radial-gradient(circle at top right,#2d0036 0%,transparent 40%),
    #020617;
    color:white;
    padding:25px;
}

.container{
    max-width:1400px;
    margin:auto;
}

h1{
    text-align:center;
    color:#19f9ff;
    font-size:48px;
    margin-bottom:20px;
    text-shadow:
    0 0 10px #19f9ff,
    0 0 20px #19f9ff,
    0 0 40px #19f9ff;
}

.live{
    text-align:center;
    color:#00ff88;
    margin-bottom:25px;
    font-size:22px;
}

.cards{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));
    gap:18px;
    margin-bottom:25px;
}

.card{
    background:rgba(10,20,40,.75);
    border:1px solid #00eaff33;
    border-radius:18px;
    padding:25px;
    text-align:center;
    box-shadow:
    0 0 20px #00f7ff11,
    inset 0 0 15px #00f7ff11;
}

.card-title{
    color:#b7e7ff;
    font-size:24px;
    margin-bottom:18px;
}

.card-value{
    font-size:38px;
    font-weight:bold;
}

#total,
#blocked{
    color:#19f9ff;
    text-shadow:0 0 15px #19f9ff;
}

#lasttime,
#nexttime{
    color:white;
    font-size:24px;
}

.search{
    margin-bottom:20px;
}

.search input{
    width:100%;
    padding:16px;
    border-radius:14px;
    border:1px solid #00f7ff44;
    background:#081426;
    color:white;
    outline:none;
    font-size:18px;
}

.search input:focus{
    box-shadow:0 0 15px #00f7ff66;
}

.table-box{
    overflow:hidden;
    border-radius:18px;
    background:rgba(5,10,30,.75);
    border:1px solid #00f7ff33;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    padding:18px;
    color:#00ffff;
    text-align:left;
    background:#081426;
}

td{
    padding:18px;
    border-top:1px solid #20324d;
}

tr:hover{
    background:#0d1d35;
}

.badge-safe{
    display:inline-block;
    background:#00ff88;
    color:black;
    padding:8px 18px;
    border-radius:20px;
    font-weight:bold;
    box-shadow:0 0 15px #00ff88;
}

.badge-block{
    display:inline-block;
    background:#ff3366;
    color:white;
    padding:8px 18px;
    border-radius:20px;
    font-weight:bold;
    box-shadow:0 0 15px #ff3366;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#8bb7d8;
    font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Nawala Checker Minitoto</h1>

<div class="live">
🟢 LIVE MONITORING ACTIVE
</div>

<div class="cards">

<div class="card">
<div class="card-title">
TOTAL DOMAIN
</div>
<div class="card-value" id="total">
0
</div>
</div>

<div class="card">
<div class="card-title">
TOTAL BLOCKED
</div>
<div class="card-value" id="blocked">
0
</div>
</div>

<div class="card">
<div class="card-title">
LAST UPDATE
</div>
<div class="card-value" id="lasttime">
-
</div>
</div>

<div class="card">
<div class="card-title">
NEXT CHECK
</div>
<div class="card-value" id="nexttime">
-
</div>
</div>

</div>

<div class="search">
<input
id="search"
type="text"
placeholder="🔍 Cari domain..."
onkeyup="filterDomain()"
>
</div>

<div class="table-box">

<table>

<thead>

<tr>
<th>Domain</th>
<th>Nawala</th>
<th>Network</th>
<th>Status</th>
<th>Checked At</th>
</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

</div>

<div class="footer">
⚡ Auto Refresh 10 Detik • Cloudflare Pages • Nawala API
</div>

</div>

<script>

let allData = [];

async function loadData(){

    try{

        const res = await fetch(
            "./status.json?v=" + Date.now(),
            {
                cache: "no-store"
            }
        );

        if(!res.ok){
            throw new Error("status.json not found");
        }

        const data = await res.json();

        allData = data.domains;

        document.getElementById(
            "total"
        ).innerHTML =
        data.total_domains;

        document.getElementById(
            "blocked"
        ).innerHTML =
        data.total_blocked;

        document.getElementById(
            "lasttime"
        ).innerHTML =
        data.last_update;

        document.getElementById(
            "nexttime"
        ).innerHTML =
        data.next_update;

        renderTable(allData);

    }
    catch(err){

        console.log("Load Error:", err);

    }

}

function renderTable(list){

    let html = "";

    list.forEach(item=>{

        const status =
        (item.nawala || item.network)
        ? "BLOCKED"
        : "SAFE";

        html += `
        <tr>

        <td>${item.domain}</td>

        <td>
            <span class="${
                item.nawala
                ? "badge-block"
                : "badge-safe"
            }">
            ${
                item.nawala
                ? "BLOCK"
                : "SAFE"
            }
            </span>
        </td>

        <td>
            <span class="${
                item.network
                ? "badge-block"
                : "badge-safe"
            }">
            ${
                item.network
                ? "BLOCK"
                : "SAFE"
            }
            </span>
        </td>

        <td>
            <span class="${
                status == "BLOCKED"
                ? "badge-block"
                : "badge-safe"
            }">
            ${status}
            </span>
        </td>

        <td>${item.checked_at}</td>

        </tr>
        `;

    });

    document.getElementById(
        "tbody"
    ).innerHTML = html;

}

function filterDomain(){

    const keyword =
    document
    .getElementById(
    "search"
    )
    .value
    .toLowerCase();

    const filtered =
    allData.filter(
    item=>

    item.domain
    .toLowerCase()
    .includes(
    keyword
    )

    );

    renderTable(
    filtered
    );

}

loadData();

setInterval(
loadData,
10000
);

</script>

</body>

</html>
